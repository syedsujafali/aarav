<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" width="100%" height="100%">
  <defs>
    <radialGradient id="bgG9" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f0911" />
      <stop offset="100%" stop-color="#050102" />
    </radialGradient>
    <linearGradient id="wineDeep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9b111e" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#4a040b" stop-opacity="1" />
    </linearGradient>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="720" height="900" fill="url(#bgG9)" />

  <g transform="translate(200, 300)">
    <!-- Wine Glass Silhouette -->
    <path d="M 0 0 C 0 160, 160 160, 160 160 C 320 160, 320 0, 320 0 Z" fill="url(#wineDeep)" />
    <!-- Glass Rim -->
    <line x1="0" y1="0" x2="320" y2="0" stroke="#f5efe4" stroke-width="2" opacity="0.5" />
    
    <!-- Stem -->
    <line x1="160" y1="160" x2="160" y2="360" stroke="#f5efe4" stroke-width="6" opacity="0.7" stroke-linecap="round" />
    
    <!-- Base -->
    <path d="M 80 360 L 240 360 C 240 380, 80 380, 80 360 Z" fill="#f5efe4" opacity="0.6" />
    
    <!-- Liquid Surface -->
    <ellipse cx="160" cy="0" rx="160" ry="20" fill="#9b111e" opacity="0.8" />
  </g>

  <!-- Ambient background glow -->
  <circle cx="360" cy="400" r="250" fill="#9b111e" opacity="0.1" filter="url(#softGlow2)" />
</svg>
