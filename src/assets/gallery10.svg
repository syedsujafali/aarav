<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgG10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140f05" />
      <stop offset="100%" stop-color="#050301" />
    </linearGradient>
    <linearGradient id="goldMalt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f39c12" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#8e44ad" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="goldSolid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f" />
      <stop offset="100%" stop-color="#e67e22" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgG10)" />

  <g transform="translate(300, 100)">
    <!-- Whiskey Decanter Silhouette -->
    <path d="M 100 0 L 200 0 L 250 150 L 250 400 L 50 400 L 50 150 Z" fill="url(#goldMalt)" stroke="url(#goldSolid)" stroke-width="3" stroke-opacity="0.5" />
    
    <!-- Abstract Liquid -->
    <path d="M 50 250 L 250 250 L 250 400 L 50 400 Z" fill="#d35400" opacity="0.8" />
    
    <!-- Abstract Ice -->
    <rect x="100" y="300" width="60" height="60" rx="10" fill="#fff" opacity="0.4" transform="rotate(15, 130, 330)" />
    <rect x="160" y="270" width="50" height="50" rx="8" fill="#fff" opacity="0.3" transform="rotate(-10, 185, 295)" />

    <!-- Label -->
    <rect x="100" y="200" width="100" height="60" fill="#f5efe4" opacity="0.9" />
    <line x1="110" y1="220" x2="190" y2="220" stroke="#000" stroke-width="4" />
    <line x1="130" y1="240" x2="170" y2="240" stroke="#c9a35a" stroke-width="2" />
  </g>

  <!-- Side Glass -->
  <g transform="translate(600, 350)">
    <rect x="0" y="0" width="120" height="150" rx="10" fill="url(#goldMalt)" stroke="url(#goldSolid)" stroke-width="2" stroke-opacity="0.5" />
    <rect x="5" y="80" width="110" height="65" rx="5" fill="#e67e22" opacity="0.7" />
    <!-- Ice -->
    <circle cx="60" cy="110" r="25" fill="#fff" opacity="0.4" />
  </g>

  <circle cx="450" cy="300" r="200" fill="#f39c12" opacity="0.08" filter="url(#glow3)" />
</svg>
