<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgG7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0b" />
      <stop offset="100%" stop-color="#001815" />
    </linearGradient>
    <linearGradient id="canColor1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#27ae60" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="canColor2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f39c12" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="canColor3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#c0392b" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bdc3c7" />
      <stop offset="50%" stop-color="#ecf0f1" />
      <stop offset="100%" stop-color="#95a5a6" />
    </linearGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bgG7)" />

  <g transform="translate(150, 150)">
    <!-- Can 1 -->
    <rect x="0" y="20" width="100" height="200" rx="10" fill="url(#canColor1)" />
    <rect x="10" y="0" width="80" height="20" rx="5" fill="url(#metal)" />
    <rect x="10" y="220" width="80" height="10" fill="url(#metal)" />
    <circle cx="50" cy="120" r="30" fill="#fff" opacity="0.2" />
  </g>

  <g transform="translate(350, 150)">
    <!-- Can 2 -->
    <rect x="0" y="20" width="100" height="200" rx="10" fill="url(#canColor2)" />
    <rect x="10" y="0" width="80" height="20" rx="5" fill="url(#metal)" />
    <rect x="10" y="220" width="80" height="10" fill="url(#metal)" />
    <polygon points="50,80 80,140 20,140" fill="#fff" opacity="0.3" />
  </g>

  <g transform="translate(550, 150)">
    <!-- Can 3 -->
    <rect x="0" y="20" width="100" height="200" rx="10" fill="url(#canColor3)" />
    <rect x="10" y="0" width="80" height="20" rx="5" fill="url(#metal)" />
    <rect x="10" y="220" width="80" height="10" fill="url(#metal)" />
    <rect x="25" y="90" width="50" height="50" rx="10" fill="#fff" opacity="0.25" transform="rotate(45, 50, 115)" />
  </g>

  <!-- Refrigerator shelves -->
  <line x1="50" y1="390" x2="850" y2="390" stroke="#7f8c8d" stroke-width="6" stroke-linecap="round" />
  <line x1="50" y1="410" x2="850" y2="410" stroke="#7f8c8d" stroke-width="2" stroke-linecap="round" />

  <path d="M -50 0 L 950 650" stroke="#fff" stroke-width="40" opacity="0.03" />
</svg>
